name: Deploy to AWS ECS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.rst'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CLAUDE.md'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  APP_NAME: transcribe-bot

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.APP_NAME }} --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ env.APP_NAME }} --region ${{ env.AWS_REGION }}

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG -t $ECR_REGISTRY/${{ env.APP_NAME }}:latest .
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}:latest

      - name: Create CloudWatch log group if not exists
        run: |
          aws logs describe-log-groups --log-group-name-prefix /ecs/${{ env.APP_NAME }} --region ${{ env.AWS_REGION }} | \
          grep -q "/ecs/${{ env.APP_NAME }}" || \
          aws logs create-log-group --log-group-name /ecs/${{ env.APP_NAME }} --region ${{ env.AWS_REGION }}

      - name: Create ECS cluster if not exists
        run: |
          aws ecs describe-clusters --clusters ${{ env.APP_NAME }} --region ${{ env.AWS_REGION }} \
            --query 'clusters[?status==`ACTIVE`].clusterName' --output text | grep -q "${{ env.APP_NAME }}" || \
          aws ecs create-cluster --cluster-name ${{ env.APP_NAME }} --region ${{ env.AWS_REGION }}

      - name: Ensure ECS task execution role
        run: |
          aws iam get-role --role-name ecsTaskExecutionRole 2>/dev/null || {
            aws iam create-role \
              --role-name ecsTaskExecutionRole \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Principal": {"Service": "ecs-tasks.amazonaws.com"},
                  "Action": "sts:AssumeRole"
                }]
              }'
            aws iam attach-role-policy \
              --role-name ecsTaskExecutionRole \
              --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
          }

      - name: Ensure ECS task role (for S3 access)
        run: |
          aws iam get-role --role-name ecsTaskRole 2>/dev/null || {
            aws iam create-role \
              --role-name ecsTaskRole \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Principal": {"Service": "ecs-tasks.amazonaws.com"},
                  "Action": "sts:AssumeRole"
                }]
              }'
          }
          # Ensure S3 read/write/list access for file storage + startup sync
          aws iam put-role-policy \
            --role-name ecsTaskRole \
            --policy-name S3TranscriptAccess \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Action": ["s3:PutObject", "s3:GetObject"],
                  "Resource": "arn:aws:s3:::'"${{ secrets.S3_BUCKET }}"'/*"
                },
                {
                  "Effect": "Allow",
                  "Action": ["s3:ListBucket"],
                  "Resource": "arn:aws:s3:::'"${{ secrets.S3_BUCKET }}"'"
                }
              ]
            }' 2>/dev/null || true

      - name: Ensure ALB and target group
        id: alb
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --region ${{ env.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' --output text)
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --region ${{ env.AWS_REGION }} \
            --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')

          # Create or get ALB security group (allows HTTP 80 from anywhere)
          ALB_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${{ env.APP_NAME }}-alb-sg" "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ env.AWS_REGION }} --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null)
          if [ "$ALB_SG_ID" = "None" ] || [ -z "$ALB_SG_ID" ]; then
            ALB_SG_ID=$(aws ec2 create-security-group \
              --group-name "${{ env.APP_NAME }}-alb-sg" \
              --description "ALB security group for ${{ env.APP_NAME }}" \
              --vpc-id "$VPC_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'GroupId' --output text)
            aws ec2 authorize-security-group-ingress \
              --group-id "$ALB_SG_ID" \
              --protocol tcp --port 80 --cidr 0.0.0.0/0 \
              --region ${{ env.AWS_REGION }}
          fi
          echo "ALB_SG_ID=$ALB_SG_ID" >> $GITHUB_OUTPUT

          # Ensure ECS task SG allows traffic from ALB SG on port 8080
          ECS_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${{ env.APP_NAME }}-sg" "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ env.AWS_REGION }} --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null)
          if [ "$ECS_SG_ID" != "None" ] && [ -n "$ECS_SG_ID" ]; then
            aws ec2 authorize-security-group-ingress \
              --group-id "$ECS_SG_ID" \
              --protocol tcp --port 8080 --source-group "$ALB_SG_ID" \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
          fi

          # Create or get target group (IP type for Fargate awsvpc)
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "${{ env.APP_NAME }}-tg" \
            --region ${{ env.AWS_REGION }} \
            --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
          if [ "$TG_ARN" = "None" ] || [ -z "$TG_ARN" ]; then
            TG_ARN=$(aws elbv2 create-target-group \
              --name "${{ env.APP_NAME }}-tg" \
              --protocol HTTP --port 8080 \
              --vpc-id "$VPC_ID" \
              --target-type ip \
              --health-check-path /api/health \
              --health-check-interval-seconds 30 \
              --healthy-threshold-count 2 \
              --unhealthy-threshold-count 3 \
              --region ${{ env.AWS_REGION }} \
              --query 'TargetGroups[0].TargetGroupArn' --output text)
          fi
          echo "TG_ARN=$TG_ARN" >> $GITHUB_OUTPUT

          # Create or get ALB
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "${{ env.APP_NAME }}-alb" \
            --region ${{ env.AWS_REGION }} \
            --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
          if [ "$ALB_ARN" = "None" ] || [ -z "$ALB_ARN" ]; then
            ALB_ARN=$(aws elbv2 create-load-balancer \
              --name "${{ env.APP_NAME }}-alb" \
              --subnets $(echo $SUBNETS | tr ',' ' ') \
              --security-groups "$ALB_SG_ID" \
              --scheme internet-facing \
              --type application \
              --region ${{ env.AWS_REGION }} \
              --query 'LoadBalancers[0].LoadBalancerArn' --output text)
            # Wait for ALB to be active
            aws elbv2 wait load-balancer-available --load-balancer-arns "$ALB_ARN" --region ${{ env.AWS_REGION }}
          fi
          echo "ALB_ARN=$ALB_ARN" >> $GITHUB_OUTPUT

          # Create listener if not exists
          LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$ALB_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'Listeners[0].ListenerArn' --output text 2>/dev/null || echo "")
          if [ "$LISTENER_ARN" = "None" ] || [ -z "$LISTENER_ARN" ]; then
            aws elbv2 create-listener \
              --load-balancer-arn "$ALB_ARN" \
              --protocol HTTP --port 80 \
              --default-actions Type=forward,TargetGroupArn="$TG_ARN" \
              --region ${{ env.AWS_REGION }}
          fi

          # Output ALB DNS
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --load-balancer-arns "$ALB_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'LoadBalancers[0].DNSName' --output text)
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "ALB URL: http://$ALB_DNS"

      - name: Register task definition
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecs register-task-definition \
            --family ${{ env.APP_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --requires-compatibilities FARGATE \
            --network-mode awsvpc \
            --cpu 2048 \
            --memory 4096 \
            --execution-role-arn "arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskExecutionRole" \
            --task-role-arn "arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskRole" \
            --volumes '[{"name": "telegram-bot-api-data", "host": {}}]' \
            --container-definitions '[{
              "name": "${{ env.APP_NAME }}",
              "image": "'"$ECR_REGISTRY/${{ env.APP_NAME }}:latest"'",
              "essential": true,
              "portMappings": [
                {"containerPort": 8080, "hostPort": 8080, "protocol": "tcp"}
              ],
              "mountPoints": [
                {"sourceVolume": "telegram-bot-api-data", "containerPath": "/var/lib/telegram-bot-api"}
              ],
              "healthCheck": {
                "command": ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"],
                "interval": 30,
                "timeout": 5,
                "retries": 3,
                "startPeriod": 60
              },
              "environment": [
                {"name": "ASSEMBLY_API_KEY", "value": "${{ secrets.ASSEMBLY_API_KEY }}"},
                {"name": "TELEGRAM_BOT_TOKEN", "value": "${{ secrets.TELEGRAM_BOT_TOKEN }}"},
                {"name": "OPENAI_API_KEY", "value": "${{ secrets.OPENAI_API_KEY }}"},
                {"name": "OPENAI_BASE_URL", "value": "${{ secrets.OPENAI_BASE_URL }}"},
                {"name": "OPENAI_MODEL", "value": "${{ secrets.OPENAI_MODEL }}"},
                {"name": "GLM_API_KEY", "value": "${{ secrets.GLM_API_KEY }}"},
                {"name": "GLM_MODEL", "value": "${{ secrets.GLM_MODEL }}"},
                {"name": "ANTHROPIC_BASE_URL", "value": "${{ secrets.ANTHROPIC_BASE_URL }}"},
                {"name": "S3_BUCKET", "value": "${{ secrets.S3_BUCKET }}"},
                {"name": "BOT_NAME", "value": "${{ secrets.BOT_NAME }}"},
                {"name": "TELEGRAM_API_SERVER", "value": "http://localhost:8081"},
                {"name": "CORS_ORIGINS", "value": "${{ secrets.CORS_ORIGINS }}"},
                {"name": "BUBBLELAB_WEBHOOK_URL", "value": "${{ secrets.BUBBLELAB_WEBHOOK_URL }}"},
                {"name": "S3_URL", "value": "${{ secrets.S3_URL }}"},
                {"name": "S3_ACCESS_KEY_ID", "value": "${{ secrets.S3_ACCESS_KEY_ID }}"},
                {"name": "S3_SECRET_ACCESS_KEY", "value": "${{ secrets.S3_SECRET_ACCESS_KEY }}"},
                {"name": "GOOGLE_DRIVE_FOLDER_ID", "value": "${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}"},
                {"name": "OPENROUTER_API_KEY", "value": "${{ secrets.OPENROUTER_API_KEY }}"}
              ],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/${{ env.APP_NAME }}",
                  "awslogs-region": "${{ env.AWS_REGION }}",
                  "awslogs-stream-prefix": "ecs"
                }
              }
            },
            {
              "name": "telegram-bot-api",
              "image": "aiogram/telegram-bot-api:latest",
              "essential": false,
              "portMappings": [
                {"containerPort": 8081, "hostPort": 8081, "protocol": "tcp"}
              ],
              "mountPoints": [
                {"sourceVolume": "telegram-bot-api-data", "containerPath": "/var/lib/telegram-bot-api"}
              ],
              "environment": [
                {"name": "TELEGRAM_API_ID", "value": "${{ secrets.TELEGRAM_API_ID }}"},
                {"name": "TELEGRAM_API_HASH", "value": "${{ secrets.TELEGRAM_API_HASH }}"},
                {"name": "TELEGRAM_LOCAL", "value": "1"}
              ],
              "command": ["--local", "--http-port=8081"],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/${{ env.APP_NAME }}",
                  "awslogs-region": "${{ env.AWS_REGION }}",
                  "awslogs-stream-prefix": "ecs-telegram-api"
                }
              }
            }]'

      - name: Deploy ECS service
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --region ${{ env.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' --output text)
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --region ${{ env.AWS_REGION }} \
            --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')

          # Get or create ECS task security group
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=${{ env.APP_NAME }}-sg" "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ env.AWS_REGION }} --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null)
          if [ "$SG_ID" = "None" ] || [ -z "$SG_ID" ]; then
            SG_ID=$(aws ec2 create-security-group \
              --group-name "${{ env.APP_NAME }}-sg" \
              --description "Security group for ${{ env.APP_NAME }}" \
              --vpc-id "$VPC_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'GroupId' --output text)
          fi

          TG_ARN="${{ steps.alb.outputs.TG_ARN }}"

          # Check if service exists and is active
          SERVICE_STATUS=$(aws ecs describe-services --cluster ${{ env.APP_NAME }} --services ${{ env.APP_NAME }} \
            --region ${{ env.AWS_REGION }} --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")

          # Check if existing service already has the ALB attached
          HAS_LB="false"
          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            EXISTING_TG=$(aws ecs describe-services --cluster ${{ env.APP_NAME }} --services ${{ env.APP_NAME }} \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].loadBalancers[0].targetGroupArn' --output text 2>/dev/null || echo "None")
            if [ "$EXISTING_TG" != "None" ] && [ -n "$EXISTING_TG" ]; then
              HAS_LB="true"
            fi
          fi

          if [ "$SERVICE_STATUS" = "ACTIVE" ] && [ "$HAS_LB" = "true" ]; then
            echo "Updating existing service (ALB already attached)..."
            aws ecs update-service \
              --cluster ${{ env.APP_NAME }} \
              --service ${{ env.APP_NAME }} \
              --task-definition ${{ env.APP_NAME }} \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          else
            # Need to (re)create service with ALB — can't add LB to existing service
            if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
              echo "Recreating service to attach ALB..."
              aws ecs update-service \
                --cluster ${{ env.APP_NAME }} \
                --service ${{ env.APP_NAME }} \
                --desired-count 0 \
                --region ${{ env.AWS_REGION }}
              aws ecs wait services-stable \
                --cluster ${{ env.APP_NAME }} \
                --services ${{ env.APP_NAME }} \
                --region ${{ env.AWS_REGION }} || true
              aws ecs delete-service \
                --cluster ${{ env.APP_NAME }} \
                --service ${{ env.APP_NAME }} \
                --region ${{ env.AWS_REGION }}
              echo "Waiting for service to drain..."
              aws ecs wait services-inactive \
                --cluster ${{ env.APP_NAME }} \
                --services ${{ env.APP_NAME }} \
                --region ${{ env.AWS_REGION }} || sleep 30
            fi

            echo "Creating service with ALB..."
            aws ecs create-service \
              --cluster ${{ env.APP_NAME }} \
              --service-name ${{ env.APP_NAME }} \
              --task-definition ${{ env.APP_NAME }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=$TG_ARN,containerName=${{ env.APP_NAME }},containerPort=8080" \
              --region ${{ env.AWS_REGION }}
          fi

      - name: Wait for deployment
        run: |
          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.APP_NAME }} \
            --services ${{ env.APP_NAME }} \
            --region ${{ env.AWS_REGION }} || true
          echo "Deployment complete!"
          echo ""
          echo "ALB URL: http://${{ steps.alb.outputs.ALB_DNS }}"
          echo "Upload:  curl -X POST http://${{ steps.alb.outputs.ALB_DNS }}/api/upload -F file=@yourfile.txt"
          echo "Health:  http://${{ steps.alb.outputs.ALB_DNS }}/api/health"
          echo "Logs:    aws logs tail /ecs/${{ env.APP_NAME }} --follow --region ${{ env.AWS_REGION }}"
